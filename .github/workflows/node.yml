name: codex-chatgpt-control

on:
  push:
    paths:
      - ".github/workflows/node.yml"
      - "package.json"
      - "packages/node/**"
  pull_request:
    paths:
      - ".github/workflows/node.yml"
      - "package.json"
      - "packages/node/**"

jobs:
  deterministic-gates:
    name: node deterministic gates (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    defaults:
      run:
        working-directory: packages/node
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: packages/node/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build
      - run: npm run bundle
      - run: npm run bundle:live-smoke
      - run: npm run bundle:backend
      - run: npm run contract:validate
      - run: npm run docs:drift
      - run: npm run parity:fixtures
      - run: npm run parity:suite
      - run: npm run test:backend-conformance
      - run: npm audit
