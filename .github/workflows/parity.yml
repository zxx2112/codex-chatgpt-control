name: codex-chatgpt-control-parity

on:
  push:
  pull_request:

jobs:
  node-backend-contracts:
    name: node backend contracts (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    defaults:
      run:
        working-directory: packages/node
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: packages/node/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build
      - run: npm run bundle
      - run: npm run bundle:live-smoke
      - run: npm run bundle:backend
      - run: npm run contract:validate
      - run: npm run docs:drift
      - run: npm run parity:fixtures
      - run: npm run parity:suite
      - run: npm run test:backend-conformance

  python-parity:
    name: python parity (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    defaults:
      run:
        working-directory: packages/python
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: packages/node/package-lock.json
      - name: Build backend bundle for Python smoke
        working-directory: packages/node
        run: |
          npm ci
          npm run bundle:backend
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -e ".[dev]"
      - run: python -m unittest discover -s tests
      - run: python -m compileall -q src
      - run: python -m compileall -q examples
      - run: python -m pyright src tests
      - run: python scripts/live_smoke.py --mode ordinary-shell
